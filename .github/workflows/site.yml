name: site
on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/site.yml']
  pull_request:
    paths: ['site/**', '.github/workflows/site.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build
